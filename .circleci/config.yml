version: 2.1

executors:
  playwright:
    docker:
      - image: mcr.microsoft.com/playwright:v1.61.1-noble
    working_directory: ~/project
    environment:
      BASE_URL: https://automationintesting.online
      DD_ENV: ci
      DD_SERVICE: velir-qa-framework
      DD_METRIC_PREFIX: qa

commands:
  restore_node_cache:
    steps:
      - restore_cache:
          keys:
            - npm-v1-{{ checksum "package-lock.json" }}
            - npm-v1-

  save_node_cache:
    steps:
      - save_cache:
          key: npm-v1-{{ checksum "package-lock.json" }}
          paths:
            - ~/.npm

  collect_playwright_artifacts:
    steps:
      - run:
          name: Prepare artifact directories
          command: mkdir -p playwright-report test-results .tmp-playwright-results
          when: always
      - store_artifacts:
          path: playwright-report
          destination: playwright-report
      - store_artifacts:
          path: test-results
          destination: test-results
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: .tmp-playwright-results
          destination: tmp-playwright-results

  notify_slack:
    parameters:
      status:
        type: string
      color:
        type: string
      when:
        type: enum
        enum: ["on_success", "on_fail", "always"]
        default: always
    steps:
      - run:
          name: Notify Slack (<< parameters.status >>)
          when: << parameters.when >>
          command: |
            if [ -z "$SLACK_WEBHOOK_URL" ]; then
              echo "SLACK_WEBHOOK_URL is not configured; skipping Slack notification."
              exit 0
            fi

            node <<'NODE' > /tmp/slack-payload.json
            const payload = {
              attachments: [
                {
                  color: process.env.SLACK_COLOR,
                  title: `CircleCI ${process.env.SLACK_STATUS}: ${process.env.CIRCLE_PROJECT_REPONAME}`,
                  title_link: process.env.CIRCLE_BUILD_URL,
                  fields: [
                    { title: 'Job', value: process.env.CIRCLE_JOB || 'unknown', short: true },
                    { title: 'Branch', value: process.env.CIRCLE_BRANCH || 'unknown', short: true },
                    { title: 'Workflow', value: process.env.CIRCLE_WORKFLOW_ID || 'unknown', short: false },
                    { title: 'Commit', value: process.env.CIRCLE_SHA1 ? process.env.CIRCLE_SHA1.slice(0, 7) : 'unknown', short: true }
                  ],
                  footer: 'Playwright QA pipeline'
                }
              ]
            };

            process.stdout.write(JSON.stringify(payload));
            NODE

            curl -fsS -X POST -H 'Content-type: application/json' --data @/tmp/slack-payload.json "$SLACK_WEBHOOK_URL"
          environment:
            SLACK_STATUS: << parameters.status >>
            SLACK_COLOR: << parameters.color >>

jobs:
  smoke:
    executor: playwright
    steps:
      - checkout
      - restore_node_cache
      - run:
          name: Install dependencies
          command: npm ci
      - save_node_cache
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Playwright smoke tests
          command: npm run test:smoke
      - collect_playwright_artifacts
      - notify_slack:
          status: passed
          color: "#2eb67d"
          when: on_success
      - notify_slack:
          status: failed
          color: "#e01e5a"
          when: on_fail

  regression:
    executor: playwright
    steps:
      - checkout
      - restore_node_cache
      - run:
          name: Install dependencies
          command: npm ci
      - save_node_cache
      - run:
          name: Typecheck
          command: npm run typecheck
      - run:
          name: Playwright full suite
          command: npm test
      - collect_playwright_artifacts
      - notify_slack:
          status: passed
          color: "#2eb67d"
          when: on_success
      - notify_slack:
          status: failed
          color: "#e01e5a"
          when: on_fail

workflows:
  qa:
    jobs:
      - smoke
      - regression:
          requires:
            - smoke
          filters:
            branches:
              only:
                - main
